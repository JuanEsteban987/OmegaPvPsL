<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Arena Shooter</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }
        
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            z-index: 100;
        }
        
        h1 {
            color: #00fff2;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00fff2;
        }
        
        input {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #0f3460;
            color: white;
            width: 200px;
        }
        
        button {
            padding: 12px 30px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        
        #gameCanvas {
            display: none;
            background: #0a0a0a;
            border: 2px solid #00fff2;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            display: none;
        }
        
        .health-bar {
            width: 200px;
            height: 30px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 15px;
            overflow: hidden;
        }
        
        #health {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            width: 100%;
            transition: width 0.3s;
        }
        
        #ammo {
            margin-top: 10px;
            font-size: 20px;
            color: #ffd700;
        }
        
        #connectionStatus {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
        }
        
        .connected { color: #00ff00; }
        .disconnected { color: #ff0000; }
        
        #instructions {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
        
        .bullet {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffff00;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>🔫 P2P ARENA SHOOTER</h1>
        <div id="setup">
            <p>Tu ID: <span id="myId" style="color: #00fff2;">Generando...</span></p>
            <input type="text" id="peerId" placeholder="ID del oponente">
            <br>
            <button onclick="hostGame()">CREAR SALA</button>
            <button onclick="joinGame()">UNIRSE</button>
        </div>
        <div id="waiting" style="display: none;">
            <p>Esperando oponente...</p>
            <p style="color: #00fff2; margin-top: 10px;">Comparte tu ID: <b id="shareId"></b></p>
        </div>
        <div id="instructions">
            <p>WASD - Moverse | Ratón - Apuntar | Click - Disparar</p>
        </div>
    </div>

    <div id="ui">
        <div class="health-bar">
            <div id="health"></div>
        </div>
        <div id="ammo">🔫 30 / ∞</div>
    </div>

    <div id="connectionStatus">
        Estado: <span id="status" class="disconnected">Desconectado</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Configuración del juego
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensiones del escenario cerrado
        const WORLD_WIDTH = 1000;
        const WORLD_HEIGHT = 600;
        
        canvas.width = WORLD_WIDTH;
        canvas.height = WORLD_HEIGHT;
        
        // Variables del juego
        let peer = null;
        let conn = null;
        let isHost = false;
        let gameLoop = null;
        let playerId = Math.random().toString(36).substr(2, 9);
        
        // Estado del jugador local
        const player = {
            x: 200,
            y: 300,
            radius: 15,
            angle: 0,
            health: 100,
            maxHealth: 100,
            speed: 4,
            color: '#00fff2',
            lastShot: 0,
            shotDelay: 150,
            isDead: false,
            score: 0
        };
        
        // Estado del oponente
        const opponent = {
            x: 800,
            y: 300,
            radius: 15,
            angle: 0,
            health: 100,
            color: '#e94560',
            isDead: false,
            score: 0
        };
        
        // Controles
        const keys = {};
        const mouse = { x: 0, y: 0 };
        
        // Balas
        let bullets = [];
        let particles = [];
        
        // Paredes del escenario (arena cerrada con obstáculos)
        const walls = [
            // Bordes
            { x: 0, y: 0, width: WORLD_WIDTH, height: 20 },
            { x: 0, y: WORLD_HEIGHT - 20, width: WORLD_WIDTH, height: 20 },
            { x: 0, y: 0, width: 20, height: WORLD_HEIGHT },
            { x: WORLD_WIDTH - 20, y: 0, width: 20, height: WORLD_HEIGHT },
            
            // Obstáculos centrales
            { x: 400, y: 200, width: 200, height: 20 },
            { x: 400, y: 400, width: 200, height: 20 },
            { x: 300, y: 250, width: 20, height: 100 },
            { x: 680, y: 250, width: 20, height: 100 },
            
            // Cajas dispersas
            { x: 150, y: 150, width: 60, height: 60 },
            { x: 790, y: 390, width: 60, height: 60 },
            { x: 100, y: 450, width: 80, height: 30 },
            { x: 820, y: 120, width: 80, height: 30 }
        ];
        
        // Inicializar PeerJS
        function initPeer() {
            peer = new Peer();
            
            peer.on('open', (id) => {
                document.getElementById('myId').textContent = id;
            });
            
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
                startGame();
            });
            
            peer.on('error', (err) => {
                alert('Error: ' + err);
            });
        }
        
        function hostGame() {
            isHost = true;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('shareId').textContent = peer.id;
        }
        
        function joinGame() {
            const peerId = document.getElementById('peerId').value;
            if (!peerId) {
                alert('Introduce un ID válido');
                return;
            }
            
            conn = peer.connect(peerId);
            isHost = false;
            
            conn.on('open', () => {
                setupConnection();
                startGame();
            });
        }
        
        function setupConnection() {
            document.getElementById('status').textContent = 'Conectado';
            document.getElementById('status').className = 'connected';
            
            conn.on('data', (data) => {
                handleNetworkData(data);
            });
            
            conn.on('close', () => {
                document.getElementById('status').textContent = 'Desconectado';
                document.getElementById('status').className = 'disconnected';
            });
        }
        
        function handleNetworkData(data) {
            if (data.type === 'player') {
                opponent.x = data.x;
                opponent.y = data.y;
                opponent.angle = data.angle;
                opponent.health = data.health;
                opponent.isDead = data.isDead;
                opponent.score = data.score;
            } else if (data.type === 'bullet') {
                bullets.push({
                    x: data.x,
                    y: data.y,
                    vx: data.vx,
                    vy: data.vy,
                    owner: 'opponent',
                    damage: 25
                });
            } else if (data.type === 'respawn') {
                opponent.isDead = false;
                opponent.health = 100;
                opponent.x = data.x;
                opponent.y = data.y;
            }
        }
        
        function sendGameData() {
            if (conn && conn.open) {
                conn.send({
                    type: 'player',
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                    health: player.health,
                    isDead: player.isDead,
                    score: player.score
                });
            }
        }
        
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('ui').style.display = 'block';
            
            // Posiciones iniciales según rol
            if (!isHost) {
                player.x = 800;
                opponent.x = 200;
            }
            
            // Event listeners
            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });
            window.addEventListener('mousedown', shoot);
            
            gameLoop = requestAnimationFrame(update);
            setInterval(sendGameData, 1000 / 60); // 60 Hz network update
        }
        
        function shoot(e) {
            if (player.isDead || Date.now() - player.lastShot < player.shotDelay) return;
            
            player.lastShot = Date.now();
            
            const bulletSpeed = 12;
            const angle = player.angle;
            
            const bullet = {
                x: player.x + Math.cos(angle) * 25,
                y: player.y + Math.sin(angle) * 25,
                vx: Math.cos(angle) * bulletSpeed,
                vy: Math.sin(angle) * bulletSpeed,
                owner: 'player',
                damage: 25
            };
            
            bullets.push(bullet);
            
            // Enviar al oponente
            if (conn && conn.open) {
                conn.send({
                    type: 'bullet',
                    x: bullet.x,
                    y: bullet.y,
                    vx: bullet.vx,
                    vy: bullet.vy
                });
            }
            
            // Efecto de retroceso visual
            createParticles(player.x, player.y, 3, '#ffff00');
        }
        
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color: color
                });
            }
        }
        
        function checkWallCollision(x, y, radius) {
            for (let wall of walls) {
                if (x + radius > wall.x && 
                    x - radius < wall.x + wall.width &&
                    y + radius > wall.y && 
                    y - radius < wall.y + wall.height) {
                    return true;
                }
            }
            return false;
        }
        
        function respawn() {
            if (isHost) {
                player.x = 200;
                player.y = 300;
            } else {
                player.x = 800;
                player.y = 300;
            }
            player.health = 100;
            player.isDead = false;
            
            if (conn && conn.open) {
                conn.send({
                    type: 'respawn',
                    x: opponent.x,
                    y: opponent.y
                });
            }
        }
        
        function update() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (!player.isDead) {
                // Movimiento
                let newX = player.x;
                let newY = player.y;
                
                if (keys['w']) newY -= player.speed;
                if (keys['s']) newY += player.speed;
                if (keys['a']) newX -= player.speed;
                if (keys['d']) newX += player.speed;
                
                // Colisión con paredes
                if (!checkWallCollision(newX, player.y, player.radius)) {
                    player.x = newX;
                }
                if (!checkWallCollision(player.x, newY, player.radius)) {
                    player.y = newY;
                }
                
                // Calcular ángulo hacia el ratón
                player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            } else {
                // Respawn después de 3 segundos
                if (!player.respawnTimer) {
                    player.respawnTimer = Date.now();
                } else if (Date.now() - player.respawnTimer > 3000) {
                    player.respawnTimer = null;
                    respawn();
                }
            }
            
            // Dibujar paredes
            ctx.fillStyle = '#2a2a3e';
            walls.forEach(wall => {
                ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                ctx.strokeStyle = '#00fff2';
                ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
            });
            
            // Actualizar balas
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                // Colisión con paredes
                if (checkWallCollision(b.x, b.y, 3)) {
                    createParticles(b.x, b.y, 5, '#ffa500');
                    bullets.splice(i, 1);
                    continue;
                }
                
                // Colisión con jugadores
                const target = b.owner === 'player' ? opponent : player;
                const dist = Math.hypot(b.x - target.x, b.y - target.y);
                
                if (dist < target.radius + 5 && !target.isDead) {
                    target.health -= b.damage;
                    createParticles(b.x, b.y, 8, '#ff0000');
                    
                    if (target.health <= 0) {
                        target.isDead = true;
                        target.health = 0;
                        if (b.owner === 'player') {
                            player.score++;
                        } else {
                            opponent.score++;
                        }
                    }
                    
                    bullets.splice(i, 1);
                    continue;
                }
                
                // Eliminar balas fuera de pantalla
                if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                // Dibujar bala
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = b.owner === 'player' ? '#00fff2' : '#e94560';
                ctx.fill();
            }
            
            // Actualizar partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
                ctx.globalAlpha = 1;
            }
            
            // Dibujar jugador local
            if (!player.isDead) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                
                // Cuerpo
                ctx.beginPath();
                ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
                ctx.fillStyle = player.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Cañón
                ctx.fillStyle = '#666';
                ctx.fillRect(0, -3, 25, 6);
                
                ctx.restore();
            } else {
                // Pantalla de muerte
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('💀 ELIMINADO', canvas.width/2, canvas.height/2);
                
                const timeLeft = Math.ceil((3000 - (Date.now() - player.respawnTimer)) / 1000);
                ctx.font = '20px Arial';
                ctx.fillText(`Reapareciendo en ${timeLeft}...`, canvas.width/2, canvas.height/2 + 40);
            }
            
            // Dibujar oponente
            if (!opponent.isDead) {
                ctx.save();
                ctx.translate(opponent.x, opponent.y);
                ctx.rotate(opponent.angle);
                
                ctx.beginPath();
                ctx.arc(0, 0, opponent.radius, 0, Math.PI * 2);
                ctx.fillStyle = opponent.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#666';
                ctx.fillRect(0, -3, 25, 6);
                
                ctx.restore();
                
                // Barra de vida del oponente
                const barWidth = 40;
                const barHeight = 4;
                ctx.fillStyle = '#333';
                ctx.fillRect(opponent.x - barWidth/2, opponent.y - 30, barWidth, barHeight);
                
                ctx.fillStyle = opponent.health > 50 ? '#0f0' : '#f00';
                ctx.fillRect(opponent.x - barWidth/2, opponent.y - 30, 
                          barWidth * (opponent.health/100), barHeight);
            }
            
            // Dibujar línea de mira
            if (!player.isDead) {
                ctx.strokeStyle = 'rgba(0, 255, 242, 0.3)';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // UI updates
            document.getElementById('health').style.width = player.health + '%';
            document.getElementById('ammo').textContent = `🔫 ${player.isDead ? 0 : Math.max(0, Math.floor((Date.now() - player.lastShot) / player.shotDelay * 30))} / ∞`;
            
            // Score
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${player.score} - ${opponent.score}`, canvas.width/2, 40);
            
            requestAnimationFrame(update);
        }
        
        // Iniciar Peer al cargar
        window.onload = initPeer;
    </script>
</body>
</html>
