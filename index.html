<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical P2P Arena</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 2px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }
        
        h1 {
            color: #d4d4d4;
            margin-bottom: 20px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        
        input {
            padding: 12px;
            margin: 10px;
            border: 1px solid #444;
            border-radius: 0;
            background: #2a2a2a;
            color: #fff;
            width: 220px;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #666;
        }
        
        button {
            padding: 12px 30px;
            margin: 10px;
            border: 1px solid #555;
            border-radius: 0;
            background: #333;
            color: #d0d0d0;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #444;
            border-color: #777;
            color: #fff;
        }
        
        button:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }
        
        #gameCanvas {
            display: none;
            background: #3d3429;
            border: 1px solid #222;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            display: none;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border: 1px solid #444;
            min-width: 220px;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #2a2a2a;
            border: 1px solid #555;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        #health {
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #cc0000);
            width: 100%;
            transition: width 0.3s;
        }
        
        #weaponInfo {
            margin-top: 15px;
            font-size: 14px;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #weaponIcon {
            width: 36px;
            height: 36px;
            border: 1px solid #555;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #weaponIcon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: grayscale(30%);
        }
        
        #connectionStatus {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .connected { color: #7c9c6c; }
        .disconnected { color: #8b4513; }
        
        #instructions {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
            line-height: 1.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .loading {
            color: #999;
            font-size: 14px;
            margin: 20px 0;
            letter-spacing: 2px;
        }
        
        #crosshair {
            position: absolute;
            width: 24px;
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
        
        #crosshair::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 8px;
            background: rgba(255, 255, 255, 0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #crosshair::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 2px;
            background: rgba(255, 255, 255, 0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    
    <div id="menu">
        <h1>Tactical P2P Arena</h1>
        <div id="setup">
            <p class="loading" id="loadingText">Cargando recursos...</p>
            <div id="gameControls" style="display: none;">
                <p style="color: #888; font-size: 12px; margin-bottom: 15px;">ID: <span id="myId" style="color: #d0d0d0; font-family: monospace;">...</span></p>
                <input type="text" id="peerId" placeholder="ID del oponente">
                <br>
                <button onclick="hostGame()" id="btnHost">Crear Sala</button>
                <button onclick="joinGame()" id="btnJoin">Unirse</button>
            </div>
        </div>
        <div id="waiting" style="display: none;">
            <p style="color: #999; font-size: 14px;">Esperando oponente...</p>
            <p style="color: #b0b0b0; margin-top: 15px; font-size: 12px; word-break: break-all;">ID: <b id="shareId" style="color: #fff;"></b></p>
        </div>
        <div id="instructions">
            <p><span style="color: #fff;">WASD</span> Mover | <span style="color: #fff;">Mouse</span> Apuntar | <span style="color: #fff;">Click</span> Atacar</p>
            <p><span style="color: #fff;">[1]</span> Espada | <span style="color: #fff;">[2]</span> Pistola</p>
        </div>
    </div>

    <div id="ui">
        <div class="health-bar">
            <div id="health"></div>
        </div>
        <div style="font-size: 11px; color: #666; margin-top: 5px;">Salud</div>
        <div id="weaponInfo">
            <div id="weaponIcon">
                <img id="currentWeaponImg" src="" alt="weapon">
            </div>
            <span id="weaponName">--</span>
        </div>
    </div>

    <div id="connectionStatus">
        <span style="color: #666;">Estado:</span> <span id="status" class="disconnected">Offline</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Configuración del juego
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const WORLD_WIDTH = 1000;
        const WORLD_HEIGHT = 600;
        
        canvas.width = WORLD_WIDTH;
        canvas.height = WORLD_HEIGHT;
        
        // Cargar assets
        const assets = {
            player: new Image(),
            sword: new Image(),
            pistol: new Image()
        };
        
        let assetsLoaded = false;
        
        assets.player.src = 'pla1.png';
        assets.sword.src = 'esp1.png';
        assets.pistol.src = 'pis1.png';
        
        // Variables del juego
        let peer = null;
        let conn = null;
        let isHost = false;
        let gameLoop = null;
        
        // Paleta de colores táctica
        const COLORS = {
            bg: '#4a453f',          // Arena oscuro Call of Duty
            bgDark: '#3d3429',      // Arena más oscuro
            wall: '#b8b8b8',        // Blanco grisáceo
            wallBorder: '#909090',  // Borde pared
            grid: 'rgba(0, 0, 0, 0.1)',
            text: '#d0d0d0',
            health: '#8b0000',
            bullet: '#d4af37',      // Oro apagado/bronce
            bulletGlow: 'rgba(212, 175, 55, 0.3)'
        };
        
        // Sistema de armas
        const WEAPONS = {
            SWORD: {
                name: 'Espada',
                type: 'melee',
                damage: 40,
                range: 60,
                cooldown: 500,
                image: assets.sword,
                offsetX: 20,
                offsetY: 10
            },
            PISTOL: {
                name: 'Pistola',
                type: 'ranged',
                damage: 25,
                speed: 12,
                cooldown: 300,
                image: assets.pistol,
                offsetX: 25,
                offsetY: 5,
                recoil: 0.3,        // Rotación en radianes
                recoilRecovery: 0.05 // Velocidad de recuperación
            }
        };
        
        // Estado del jugador local
        const player = {
            x: 200,
            y: 300,
            width: 40,
            height: 40,
            angle: 0,
            health: 100,
            maxHealth: 100,
            speed: 4,
            lastAttack: 0,
            currentWeapon: 'PISTOL',
            isAttacking: false,
            attackAnimation: 0,
            weaponRecoil: 0,        // Nuevo: animación de retroceso rotacional
            isDead: false,
            score: 0,
            flip: false
        };
        
        // Estado del oponente
        const opponent = {
            x: 800,
            y: 300,
            width: 40,
            height: 40,
            angle: 0,
            health: 100,
            currentWeapon: 'PISTOL',
            isAttacking: false,
            attackAnimation: 0,
            weaponRecoil: 0,
            isDead: false,
            score: 0,
            flip: false
        };
        
        // Controles
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };
        
        // Balas y efectos
        let bullets = [];
        let slashEffects = [];
        let particles = [];
        
        // Paredes del escenario
        const walls = [
            { x: 0, y: 0, width: WORLD_WIDTH, height: 20 },
            { x: 0, y: WORLD_HEIGHT - 20, width: WORLD_WIDTH, height: 20 },
            { x: 0, y: 0, width: 20, height: WORLD_HEIGHT },
            { x: WORLD_WIDTH - 20, y: 0, width: 20, height: WORLD_HEIGHT },
            { x: 400, y: 200, width: 200, height: 20 },
            { x: 400, y: 400, width: 200, height: 20 },
            { x: 300, y: 250, width: 20, height: 100 },
            { x: 680, y: 250, width: 20, height: 100 },
            { x: 150, y: 150, width: 60, height: 60 },
            { x: 790, y: 390, width: 60, height: 60 },
            { x: 100, y: 450, width: 80, height: 30 },
            { x: 820, y: 120, width: 80, height: 30 }
        ];
        
        // Cargar recursos
        Promise.all([
            new Promise(resolve => assets.player.onload = resolve),
            new Promise(resolve => assets.sword.onload = resolve),
            new Promise(resolve => assets.pistol.onload = resolve)
        ]).then(() => {
            assetsLoaded = true;
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('gameControls').style.display = 'block';
            initPeer();
        }).catch(err => {
            console.error('Error cargando assets:', err);
            document.getElementById('loadingText').textContent = 'Error: Verifica que existan pla1.png, esp1.png y pis1.png';
        });
        
        function initPeer() {
            peer = new Peer();
            
            peer.on('open', (id) => {
                document.getElementById('myId').textContent = id;
            });
            
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
                startGame();
            });
            
            peer.on('error', (err) => {
                alert('Error: ' + err);
            });
        }
        
        function hostGame() {
            if (!assetsLoaded) return;
            isHost = true;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('shareId').textContent = peer.id;
        }
        
        function joinGame() {
            if (!assetsLoaded) return;
            const peerId = document.getElementById('peerId').value;
            if (!peerId) {
                alert('Introduce un ID válido');
                return;
            }
            
            conn = peer.connect(peerId);
            isHost = false;
            
            conn.on('open', () => {
                setupConnection();
                startGame();
            });
        }
        
        function setupConnection() {
            document.getElementById('status').textContent = 'Conectado';
            document.getElementById('status').className = 'connected';
            
            conn.on('data', (data) => {
                handleNetworkData(data);
            });
            
            conn.on('close', () => {
                document.getElementById('status').textContent = 'Desconectado';
                document.getElementById('status').className = 'disconnected';
            });
        }
        
        function handleNetworkData(data) {
            if (data.type === 'player') {
                opponent.x = data.x;
                opponent.y = data.y;
                opponent.angle = data.angle;
                opponent.health = data.health;
                opponent.isDead = data.isDead;
                opponent.score = data.score;
                opponent.currentWeapon = data.weapon;
                opponent.isAttacking = data.isAttacking;
                opponent.attackAnimation = data.attackAnimation;
                opponent.weaponRecoil = data.weaponRecoil || 0;
                opponent.flip = data.flip;
            } else if (data.type === 'bullet') {
                bullets.push({
                    x: data.x,
                    y: data.y,
                    vx: data.vx,
                    vy: data.vy,
                    owner: 'opponent',
                    damage: WEAPONS.PISTOL.damage
                });
            } else if (data.type === 'slash') {
                createSlashEffect(opponent.x, opponent.y, opponent.angle, 'opponent');
                checkSlashDamage(opponent, player);
            } else if (data.type === 'respawn') {
                opponent.isDead = false;
                opponent.health = 100;
                opponent.x = data.x;
                opponent.y = data.y;
            } else if (data.type === 'weaponChange') {
                opponent.currentWeapon = data.weapon;
            }
        }
        
        function sendGameData() {
            if (conn && conn.open) {
                conn.send({
                    type: 'player',
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                    health: player.health,
                    isDead: player.isDead,
                    score: player.score,
                    weapon: player.currentWeapon,
                    isAttacking: player.isAttacking,
                    attackAnimation: player.attackAnimation,
                    weaponRecoil: player.weaponRecoil,
                    flip: player.flip
                });
            }
        }
        
        function switchWeapon(weaponName) {
            if (player.currentWeapon === weaponName || player.isDead) return;
            
            player.currentWeapon = weaponName;
            player.weaponRecoil = 0; // Resetear recoil al cambiar
            updateWeaponUI();
            
            if (conn && conn.open) {
                conn.send({
                    type: 'weaponChange',
                    weapon: weaponName
                });
            }
        }
        
        function updateWeaponUI() {
            const weapon = WEAPONS[player.currentWeapon];
            document.getElementById('currentWeaponImg').src = weapon.image.src;
            document.getElementById('weaponName').textContent = weapon.name;
        }
        
        function attack() {
            if (player.isDead || player.isAttacking) return;
            
            const weapon = WEAPONS[player.currentWeapon];
            const now = Date.now();
            
            if (now - player.lastAttack < weapon.cooldown) return;
            
            player.lastAttack = now;
            player.isAttacking = true;
            player.attackAnimation = 0;
            
            if (weapon.type === 'melee') {
                // Ataque de espada
                setTimeout(() => {
                    createSlashEffect(player.x, player.y, player.angle, 'player');
                    
                    const dist = Math.hypot(opponent.x - player.x, opponent.y - player.y);
                    if (dist < weapon.range && !opponent.isDead) {
                        const angleToOpponent = Math.atan2(opponent.y - player.y, opponent.x - player.x);
                        const angleDiff = Math.abs(angleToOpponent - player.angle);
                        const normalizedDiff = Math.min(angleDiff, 2 * Math.PI - angleDiff);
                        
                        if (normalizedDiff < Math.PI / 3) {
                            opponent.health -= weapon.damage;
                            createParticles(opponent.x, opponent.y, 10, '#8b0000');
                            
                            if (opponent.health <= 0) {
                                opponent.isDead = true;
                                opponent.health = 0;
                                player.score++;
                            }
                        }
                    }
                    
                    if (conn && conn.open) {
                        conn.send({ type: 'slash' });
                    }
                }, 100);
                
                setTimeout(() => {
                    player.isAttacking = false;
                }, 300);
            } else {
                // Disparo de pistola - SIN RETROCESO DE POSICIÓN, solo rotación
                player.weaponRecoil = weapon.recoil; // Aplicar rotación de retroceso
                
                const bullet = {
                    x: player.x + Math.cos(player.angle) * 30,
                    y: player.y + Math.sin(player.angle) * 30,
                    vx: Math.cos(player.angle) * weapon.speed,
                    vy: Math.sin(player.angle) * weapon.speed,
                    owner: 'player',
                    damage: weapon.damage
                };
                
                bullets.push(bullet);
                
                // Casquillo (efecto visual apenas visible)
                createParticles(
                    player.x + Math.cos(player.angle + Math.PI/2) * 10,
                    player.y + Math.sin(player.angle + Math.PI/2) * 10,
                    1, '#b8860b'
                );
                
                if (conn && conn.open) {
                    conn.send({
                        type: 'bullet',
                        x: bullet.x,
                        y: bullet.y,
                        vx: bullet.vx,
                        vy: bullet.vy
                    });
                }
                
                setTimeout(() => {
                    player.isAttacking = false;
                }, 100);
            }
        }
        
        function createSlashEffect(x, y, angle, owner) {
            slashEffects.push({
                x: x,
                y: y,
                angle: angle,
                life: 8,
                owner: owner,
                distance: 0
            });
        }
        
        function checkSlashDamage(attacker, target) {
            const weapon = WEAPONS.SWORD;
            const dist = Math.hypot(target.x - attacker.x, target.y - attacker.y);
            
            if (dist < weapon.range && !target.isDead) {
                const angleToTarget = Math.atan2(target.y - attacker.y, target.x - attacker.x);
                const angleDiff = Math.abs(angleToTarget - attacker.angle);
                const normalizedDiff = Math.min(angleDiff, 2 * Math.PI - angleDiff);
                
                if (normalizedDiff < Math.PI / 3) {
                    target.health -= weapon.damage;
                    createParticles(target.x, target.y, 10, '#8b0000');
                    
                    if (target.health <= 0) {
                        target.isDead = true;
                        target.health = 0;
                        if (target === opponent) player.score++;
                        else opponent.score++;
                    }
                }
            }
        }
        
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 0.8,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }
        
        function checkWallCollision(x, y, radius) {
            for (let wall of walls) {
                if (x + radius > wall.x && 
                    x - radius < wall.x + wall.width &&
                    y + radius > wall.y && 
                    y - radius < wall.y + wall.height) {
                    return true;
                }
            }
            return false;
        }
        
        function respawn() {
            if (isHost) {
                player.x = 200;
                player.y = 300;
            } else {
                player.x = 800;
                player.y = 300;
            }
            player.health = 100;
            player.isDead = false;
            player.weaponRecoil = 0;
            
            if (conn && conn.open) {
                conn.send({
                    type: 'respawn',
                    x: isHost ? 800 : 200,
                    y: 300
                });
            }
        }
        
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            if (!isHost) {
                player.x = 800;
                opponent.x = 200;
            }
            
            updateWeaponUI();
            
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === '1') switchWeapon('SWORD');
                if (e.key === '2') switchWeapon('PISTOL');
            });
            
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
                
                const crosshair = document.getElementById('crosshair');
                crosshair.style.left = e.clientX + 'px';
                crosshair.style.top = e.clientY + 'px';
            });
            window.addEventListener('mousedown', () => {
                mouse.down = true;
                attack();
            });
            window.addEventListener('mouseup', () => mouse.down = false);
            
            gameLoop = requestAnimationFrame(update);
            setInterval(sendGameData, 1000 / 60);
        }
        
        function drawRotatedImage(image, x, y, width, height, angle, flip = false) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            if (flip) {
                ctx.scale(1, -1);
            }
            ctx.drawImage(image, -width/2, -height/2, width, height);
            ctx.restore();
        }
        
        function drawWeapon(weapon, x, y, angle, isAttacking, attackProgress, recoil, flip = false) {
            ctx.save();
            ctx.translate(x, y);
            
            // Aplicar rotación base más retroceso
            let drawAngle = angle;
            
            if (weapon.type === 'ranged' && recoil > 0) {
                drawAngle -= recoil; // Rotar hacia atrás
            }
            
            if (weapon.type === 'melee' && isAttacking) {
                const swingAngle = Math.sin(attackProgress * Math.PI) * Math.PI / 4;
                drawAngle += swingAngle;
            }
            
            ctx.rotate(drawAngle);
            if (flip) ctx.scale(1, -1);
            
            // Dibujar arma con posible "retroceso visual" de posición (no del jugador)
            let offsetX = weapon.offsetX;
            let offsetY = weapon.offsetY;
            
            if (weapon.type === 'ranged' && recoil > 0) {
                offsetX -= recoil * 10; // Mover el sprite un poco hacia atrás
            }
            
            ctx.drawImage(weapon.image, offsetX - 20, offsetY - 20, 40, 40);
            ctx.restore();
        }
        
        function update() {
            // Fondo arena Call of Duty
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Textura sutil de arena
            ctx.fillStyle = COLORS.bgDark;
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % WORLD_WIDTH;
                const y = (i * 253) % WORLD_HEIGHT;
                ctx.fillRect(x, y, 2, 2);
            }
            
            // Grid muy sutil
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < WORLD_WIDTH; i += 100) {
                ctx.moveTo(i, 0);
                ctx.lineTo(i, WORLD_HEIGHT);
            }
            for (let i = 0; i < WORLD_HEIGHT; i += 100) {
                ctx.moveTo(0, i);
                ctx.lineTo(WORLD_WIDTH, i);
            }
            ctx.stroke();
            
            // Lógica jugador
            if (!player.isDead) {
                let newX = player.x;
                let newY = player.y;
                
                if (keys['w']) newY -= player.speed;
                if (keys['s']) newY += player.speed;
                if (keys['a']) newX -= player.speed;
                if (keys['d']) newX += player.speed;
                
                if (!checkWallCollision(newX, player.y, player.width/2)) player.x = newX;
                if (!checkWallCollision(player.x, newY, player.height/2)) player.y = newY;
                
                const dx = mouse.x - player.x;
                const dy = mouse.y - player.y;
                player.angle = Math.atan2(dy, dx);
                player.flip = Math.abs(player.angle) > Math.PI / 2;
                
                if (player.isAttacking) {
                    player.attackAnimation += 0.15;
                    if (player.attackAnimation >= 1) player.isAttacking = false;
                }
                
                // Recuperación del retroceso del arma
                if (player.weaponRecoil > 0) {
                    player.weaponRecoil -= WEAPONS.PISTOL.recoilRecovery;
                    if (player.weaponRecoil < 0) player.weaponRecoil = 0;
                }
            } else {
                if (!player.respawnTimer) {
                    player.respawnTimer = Date.now();
                } else if (Date.now() - player.respawnTimer > 3000) {
                    player.respawnTimer = null;
                    respawn();
                }
            }
            
            // Dibujar paredes - Blanco grisáceo
            ctx.fillStyle = COLORS.wall;
            ctx.strokeStyle = COLORS.wallBorder;
            ctx.lineWidth = 2;
            walls.forEach(wall => {
                ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
                
                // Sombra sutil
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(wall.x + 2, wall.y + wall.height - 4, wall.width - 2, 4);
                ctx.fillStyle = COLORS.wall;
            });
            
            // Actualizar balas
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                if (checkWallCollision(b.x, b.y, 3)) {
                    createParticles(b.x, b.y, 3, '#555');
                    bullets.splice(i, 1);
                    continue;
                }
                
                const target = b.owner === 'player' ? opponent : player;
                const dist = Math.hypot(b.x - target.x, b.y - target.y);
                
                if (dist < target.width/2 + 5 && !target.isDead) {
                    target.health -= b.damage;
                    createParticles(target.x, target.y, 6, '#8b0000');
                    
                    if (target.health <= 0) {
                        target.isDead = true;
                        target.health = 0;
                        if (b.owner === 'player') player.score++;
                        else opponent.score++;
                    }
                    
                    bullets.splice(i, 1);
                    continue;
                }
                
                if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                // Bala estilo táctico - sin brillo excesivo
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.bullet;
                ctx.fill();
            }
            
            // Efectos de slash
            for (let i = slashEffects.length - 1; i >= 0; i--) {
                let s = slashEffects[i];
                s.life--;
                s.distance += 3;
                
                if (s.life <= 0) {
                    slashEffects.splice(i, 1);
                    continue;
                }
                
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.angle);
                
                const alpha = s.life / 8;
                ctx.strokeStyle = `rgba(200, 200, 200, ${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 35 + s.distance, -Math.PI/3, Math.PI/3);
                ctx.stroke();
                
                ctx.restore();
            }
            
            // Partículas oscuras/sangre
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                p.vy += 0.05;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1;
            }
            
            // Dibujar oponente
            if (!opponent.isDead) {
                // Sombra
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(opponent.x, opponent.y + 20, 18, 6, 0, 0, Math.PI*2);
                ctx.fill();
                
                drawRotatedImage(assets.player, opponent.x, opponent.y, 
                               opponent.width, opponent.height, opponent.angle, opponent.flip);
                
                const oppWeapon = WEAPONS[opponent.currentWeapon];
                drawWeapon(oppWeapon, opponent.x, opponent.y, opponent.angle,
                          opponent.isAttacking, opponent.attackAnimation, 
                          opponent.weaponRecoil || 0, opponent.flip);
                
                // Barra de vida grisácea
                const barWidth = 50;
                ctx.fillStyle = '#333';
                ctx.fillRect(opponent.x - barWidth/2, opponent.y - 45, barWidth, 4);
                ctx.fillStyle = opponent.health > 50 ? '#666' : '#8b0000';
                ctx.fillRect(opponent.x - barWidth/2, opponent.y - 45, 
                          barWidth * (opponent.health/100), 4);
            }
            
            // Dibujar jugador local
            if (!player.isDead) {
                // Sombra
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(player.x, player.y + 20, 18, 6, 0, 0, Math.PI*2);
                ctx.fill();
                
                drawRotatedImage(assets.player, player.x, player.y, 
                               player.width, player.height, player.angle, player.flip);
                
                const currentWpn = WEAPONS[player.currentWeapon];
                drawWeapon(currentWpn, player.x, player.y, player.angle,
                          player.isAttacking, player.attackAnimation, 
                          player.weaponRecoil, player.flip);
                
                // Línea de mira sutil (pistola)
                if (player.currentWeapon === 'PISTOL') {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.setLineDash([8, 8]);
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(
                        player.x + Math.cos(player.angle) * 150,
                        player.y + Math.sin(player.angle) * 150
                    );
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                // Indicador de rango de espada
                if (player.currentWeapon === 'SWORD' && player.isAttacking) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, 60, 
                           player.angle - Math.PI/3, 
                           player.angle + Math.PI/3);
                    ctx.stroke();
                }
            } else {
                // Pantalla de muerte oscura
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#666';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('CAÍDO', canvas.width/2, canvas.height/2 - 40);
                
                const timeLeft = Math.max(0, Math.ceil((3000 - (Date.now() - player.respawnTimer)) / 1000));
                ctx.font = '16px Arial';
                ctx.fillStyle = '#888';
                ctx.fillText(`Reapareciendo... ${timeLeft}`, canvas.width/2, canvas.height/2 + 20);
            }
            
            // UI
            document.getElementById('health').style.width = player.health + '%';
            
            // Score - estilo militar
            ctx.fillStyle = '#d0d0d0';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(`${player.score} : ${opponent.score}`, canvas.width/2, 35);
            
            // Controles hint
            ctx.font = '11px Courier New';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.textAlign = 'left';
            ctx.fillText('[1]ESP [2]PIST', 10, canvas.height - 15);
            
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
