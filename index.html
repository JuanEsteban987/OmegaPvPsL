<!DOCTYPE html>
<html>
<head>
    <title>CS 2D P2P - Pro</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 5px solid #444; background: #333; cursor: crosshair; }
        #ui-overlay { position: absolute; top: 100px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; width: 300px; }
        .hidden { display: none; }
        button { padding: 10px; margin: 5px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
        button:hover { background: #666; }
    </style>
</head>
<body>
    <h2>CS 2D P2P</h2>
    <div id="connection-info">Tu ID: <span id="my-id">...</span></div>
    
    <div id="game-container" style="position: relative;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui-overlay">
            <div id="menu-inicial">
                <h3>MENÚ PRINCIPAL</h3>
                <input type="text" id="peer-id" placeholder="ID del Oponente">
                <button onclick="connectToPeer()">Conectar</button>
                <hr>
                <p>Selecciona Bando:</p>
                <button onclick="chooseTeam('CT')" style="color: #5d5dff;">Counter-Terrorists</button>
                <button onclick="chooseTeam('TR')" style="color: #ff5d5d;">Terrorists</button>
            </div>

            <div id="tienda" class="hidden">
                <h3>TIENDA (B)</h3>
                <p>Dinero: $<span id="money-display">800</span></p>
                <button onclick="buyWeapon('AK47', 2500)">AK47 ($2500)</button>
                <button onclick="buyWeapon('M4A1', 3100)">M4A1 ($3100)</button>
                <button onclick="buyWeapon('AWP', 4750)">AWP ($4750)</button>
                <br>
                <button onclick="toggleStore()">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
