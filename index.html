<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmegaPvPsl</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* MAIN MENU - Más compacto */
        #mainMenu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow: hidden;
        }
        
        .menu-header {
            padding: 15px;
            text-align: center;
        }
        
        #gameTitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(180deg, #d4af37 0%, #8b6914 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .menu-subtitle {
            color: #666;
            font-size: 10px;
            letter-spacing: 3px;
        }
        
        .character-showcase {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .character-bg {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        #characterDisplay {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }
        
        .menu-controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        }
        
        .nickname-container {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        
        #nicknameDisplay {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            min-width: 120px;
        }
        
        .edit-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            font-size: 14px;
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .menu-btn {
            padding: 10px 15px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        
        #playBtn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(180deg, #d4af37 0%, #8b6914 100%);
            border: none;
            color: #000;
            font-size: 18px;
            font-weight: 900;
            border-radius: 8px;
        }
        
        /* Modales más pequeños */
        #nicknameModal, #skinsModal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 300;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }
        
        #nicknameInput {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #d4af37;
            padding: 10px 20px;
            color: #fff;
            font-size: 16px;
            width: 200px;
        }
        
        .color-picker {
            display: flex;
            gap: 8px;
        }
        
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        /* LOBBY P2P Compacto */
        #lobbyMenu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 25px;
            border: 1px solid #333;
            border-top: 2px solid #d4af37;
            z-index: 100;
            width: 300px;
        }
        
        #lobbyMenu h2 {
            color: #d4af37;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            width: 100%;
            font-size: 12px;
        }
        
        button {
            padding: 8px 15px;
            margin: 5px;
            border: 1px solid #555;
            background: #333;
            color: #d0d0d0;
            cursor: pointer;
            font-size: 11px;
        }
        
        /* GAME UI Pequeña */
        #gameCanvas {
            display: none;
            background: #3d3429;
            width: 800px;
            height: 480px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            transform-origin: center;
            image-rendering: pixelated;
        }
        
        #ui {
            position: absolute;
            top: 5px;
            left: 5px;
            display: none;
            background: rgba(20, 20, 20, 0.9);
            padding: 8px;
            border: 1px solid #444;
            z-index: 50;
            pointer-events: none;
            font-size: 11px;
            transform: scale(0.9);
            transform-origin: top left;
        }
        
        .health-bar {
            width: 100px;
            height: 10px;
            background: #2a2a2a;
            border: 1px solid #555;
            margin-bottom: 3px;
        }
        
        #health {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #8b6914);
            transition: width 0.3s;
        }
        
        #weaponInfo {
            margin-top: 5px;
            font-size: 9px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        #weaponIcon {
            width: 20px;
            height: 20px;
            border: 1px solid #555;
        }
        
        #weaponIcon img {
            width: 100%;
            height: 100%;
        }
        
        #connectionStatus {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 5px 10px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            font-size: 9px;
            z-index: 50;
        }
        
        /* Controles Móviles Más Pequeños */
        #mobileControls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 40;
            pointer-events: none;
        }
        
        #joystickZone {
            position: absolute;
            bottom: 15px;
            left: 15px;
            width: 80px;
            height: 80px;
            pointer-events: auto;
        }
        
        #joystickBase {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }
        
        #joystickKnob {
            position: absolute;
            width: 35px;
            height: 35px;
            background: rgba(212, 175, 55, 0.3);
            border: 2px solid #d4af37;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #actionButtons {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }
        
        .mobile-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }
        
        #btnAttack {
            width: 60px;
            height: 60px;
            font-size: 24px;
        }
        
        #btnDash {
            display: none;
            font-size: 12px;
        }
        
        #weaponSelect {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: auto;
        }
        
        .weapon-btn {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        
        .weapon-btn.active {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.2);
        }
        
        #cooldownOverlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: rgba(0, 0, 0, 0.8);
            transition: height 0.1s;
            border-radius: 50%;
        }
        
        .dash-indicator {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: dashPulse 0.5s ease-out;
        }
        
        @keyframes dashPulse {
            to { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="crosshair" style="display: none; position: absolute; width: 16px; height: 16px; border: 1px solid rgba(255,255,255,0.6); border-radius: 50%; pointer-events: none; z-index: 45; transform: translate(-50%, -50%);"></div>
    
    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div class="menu-header">
            <h1 id="gameTitle">OMEGAPVPSL</h1>
            <div class="menu-subtitle">Tactical P2P Combat</div>
        </div>
        
        <div class="character-showcase">
            <div class="character-bg"></div>
            <img id="characterDisplay" src="pla1.png" alt="Character">
        </div>
        
        <div class="menu-controls">
            <div class="nickname-container">
                <div id="nicknameDisplay">Jugador_1</div>
                <button class="edit-btn" onclick="editNickname()">✎</button>
            </div>
            
            <div class="action-buttons">
                <button class="menu-btn" onclick="openSkins()">
                    <span>👕</span>
                    <span>SKINS</span>
                </button>
                <button class="menu-btn" onclick="openSettings()">
                    <span>⚙️</span>
                    <span>AJUSTES</span>
                </button>
            </div>
            
            <button id="playBtn" onclick="goToLobby()">JUGAR</button>
        </div>
    </div>
    
    <!-- Modales -->
    <div id="nicknameModal">
        <h3 style="color: #d4af37; font-size: 16px;">EDITAR NOMBRE</h3>
        <input type="text" id="nicknameInput" maxlength="10">
        <button onclick="saveNickname()" style="background: #d4af37; color: #000;">GUARDAR</button>
        <button onclick="closeNicknameModal()">CANCELAR</button>
    </div>
    
    <div id="skinsModal">
        <h2 style="color: #d4af37; font-size: 18px;">SKINS</h2>
        <div class="color-picker">
            <div class="color-option selected" style="background: #00fff2;" onclick="changeSkin('#00fff2', this)"></div>
            <div class="color-option" style="background: #e94560;" onclick="changeSkin('#e94560', this)"></div>
            <div class="color-option" style="background: #7c9c6c;" onclick="changeSkin('#7c9c6c', this)"></div>
            <div class="color-option" style="background: #d4af37;" onclick="changeSkin('#d4af37', this)"></div>
            <div class="color-option" style="background: #8b4513;" onclick="changeSkin('#8b4513', this)"></div>
        </div>
        <button onclick="closeSkins()" style="background: #d4af37; color: #000;">LISTO</button>
    </div>

    <!-- LOBBY -->
    <div id="lobbyMenu">
        <button onclick="backToMain()" style="position: absolute; top: 10px; left: 10px; font-size: 10px; padding: 5px;">←</button>
        <h2>SALA P2P</h2>
        <div id="lobbyContent">
            <p style="font-size: 10px; color: #666;">ID: <span id="myId" style="color: #d4af37;">...</span></p>
            <input type="text" id="peerId" placeholder="ID oponente">
            <button onclick="hostGame()" style="background: rgba(212, 175, 55, 0.2); border-color: #d4af37; color: #d4af37; width: 100%; margin: 5px 0;">CREAR</button>
            <button onclick="joinGame()" style="width: 100%;">UNIRSE</button>
        </div>
        <div id="waiting" style="display: none;">
            <p style="color: #d4af37; font-size: 12px;">Esperando...</p>
            <p style="font-size: 10px; word-break: break-all;"><span id="shareId"></span></p>
            <button onclick="cancelWait()" style="margin-top: 10px; border-color: #e94560; color: #e94560;">X</button>
        </div>
    </div>

    <!-- UI Juego -->
    <div id="ui">
        <div class="health-bar"><div id="health"></div></div>
        <div style="font-size: 9px; color: #666;">100 HP</div>
        <div id="weaponInfo">
            <div id="weaponIcon"><img id="currentWeaponImg" src="" alt="w"></div>
            <span id="weaponName">--</span>
        </div>
    </div>

    <div id="connectionStatus">
        <span style="color: #666;">Estado:</span> <span id="status" class="disconnected">Offline</span>
    </div>

    <!-- Controles Móviles -->
    <div id="mobileControls">
        <div id="joystickZone">
            <div id="joystickBase"></div>
            <div id="joystickKnob"></div>
        </div>
        
        <div id="weaponSelect">
            <div class="weapon-btn active" id="btnSword" onclick="switchWeapon('SWORD')">⚔️</div>
            <div class="weapon-btn" id="btnPistol" onclick="switchWeapon('PISTOL')">🔫</div>
        </div>
        
        <div id="actionButtons">
            <div class="mobile-btn" id="btnDash" onclick="performDash()">
                Q
                <div id="cooldownOverlay"></div>
            </div>
            <div class="mobile-btn" id="btnAttack" onclick="attack()">⚔️</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Mapa más pequeño 800x480
        const WORLD_WIDTH = 800;
        const WORLD_HEIGHT = 480;
        canvas.width = WORLD_WIDTH;
        canvas.height = WORLD_HEIGHT;
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let playerColor = '#00fff2';
        
        const assets = {
            player: new Image(),
            sword: new Image(),
            pistol: new Image()
        };
        
        assets.player.src = 'pla1.png';
        assets.sword.src = 'esp1.png';
        assets.pistol.src = 'pis1.png';
        
        let peer = null;
        let conn = null;
        let isHost = false;
        
        // Armas: Pistola 15, Espada 20
        const WEAPONS = {
            SWORD: { 
                name: 'Espada', type: 'melee', damage: 20, range: 50, cooldown: 400,
                image: assets.sword, offsetX: 15, offsetY: 8, canDash: true,
                dashCooldown: 1500, dashDuration: 200, dashSpeed: 8 // Dash acelerado
            },
            PISTOL: { 
                name: 'Pistola', type: 'ranged', damage: 15, speed: 10, cooldown: 250,
                image: assets.pistol, offsetX: 20, offsetY: 4, recoil: 0.2, 
                recoilRecovery: 0.03, canDash: false
            }
        };
        
        // Jugador con rotación separada
        const player = {
            x: 150, y: 240, 
            width: 28, height: 28, // Más pequeño
            bodyAngle: 0,      // Ángulo del cuerpo (dirección de movimiento)
            aimAngle: 0,       // Ángulo del arma (mira)
            health: 100, maxHealth: 100, 
            speed: 3,          // Velocidad base más lenta
            baseSpeed: 3,
            lastAttack: 0, currentWeapon: 'SWORD',
            isAttacking: false, attackAnimation: 0,
            weaponRecoil: 0, isDead: false, score: 0,
            flip: false,
            // Dash acelerado
            isDashing: false,
            dashEndTime: 0,
            lastDashTime: 0,
            dashDirection: {x: 0, y: 0}
        };
        
        const opponent = {
            x: 650, y: 240, 
            width: 28, height: 28,
            bodyAngle: 0, aimAngle: 0,
            health: 100, currentWeapon: 'SWORD',
            isAttacking: false, attackAnimation: 0,
            weaponRecoil: 0, isDead: false, score: 0,
            flip: false, isDashing: false
        };
        
        const keys = {};
        const mouse = { x: 0, y: 0 };
        let bullets = [], slashEffects = [], particles = [];
        
        // Paredes escaladas
        const walls = [
            { x: 0, y: 0, width: 800, height: 15 },
            { x: 0, y: 465, width: 800, height: 15 },
            { x: 0, y: 0, width: 15, height: 480 },
            { x: 785, y: 0, width: 15, height: 480 },
            { x: 320, y: 160, width: 160, height: 15 },
            { x: 320, y: 320, width: 160, height: 15 },
            { x: 240, y: 200, width: 15, height: 80 },
            { x: 545, y: 200, width: 15, height: 80 },
            { x: 120, y: 120, width: 45, height: 45 },
            { x: 635, y: 315, width: 45, height: 45 }
        ];
        
        // Funciones Menú
        function editNickname() {
            document.getElementById('nicknameModal').style.display = 'flex';
            document.getElementById('nicknameInput').value = document.getElementById('nicknameDisplay').textContent;
        }
        function saveNickname() {
            const val = document.getElementById('nicknameInput').value.trim();
            if (val) document.getElementById('nicknameDisplay').textContent = val;
            closeNicknameModal();
        }
        function closeNicknameModal() { document.getElementById('nicknameModal').style.display = 'none'; }
        function openSkins() { document.getElementById('skinsModal').style.display = 'flex'; }
        function closeSkins() { document.getElementById('skinsModal').style.display = 'none'; }
        function changeSkin(color, el) {
            playerColor = color;
            document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('characterDisplay').style.filter = `drop-shadow(0 0 15px ${color})`;
        }
        function goToLobby() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('lobbyMenu').style.display = 'block';
            if (!peer) initPeer();
        }
        function backToMain() {
            document.getElementById('lobbyMenu').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
        }
        function cancelWait() {
            document.getElementById('waiting').style.display = 'none';
            document.getElementById('lobbyContent').style.display = 'block';
        }
        
        // PeerJS
        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => document.getElementById('myId').textContent = id);
            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                startGame();
            });
        }
        function hostGame() {
            isHost = true;
            document.getElementById('lobbyContent').style.display = 'none';
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('shareId').textContent = peer.id;
        }
        function joinGame() {
            const id = document.getElementById('peerId').value;
            if (!id) return;
            conn = peer.connect(id);
            isHost = false;
            conn.on('open', () => { setupConnection(); startGame(); });
        }
        function setupConnection() {
            document.getElementById('status').textContent = 'Conectado';
            document.getElementById('status').className = 'connected';
            conn.on('data', handleNetworkData);
        }
        
        function handleNetworkData(data) {
            if (data.type === 'player') {
                opponent.x = data.x; opponent.y = data.y;
                opponent.bodyAngle = data.bodyAngle || 0;
                opponent.aimAngle = data.aimAngle || 0;
                opponent.health = data.health;
                opponent.isDead = data.isDead;
                opponent.score = data.score;
                opponent.currentWeapon = data.weapon;
                opponent.isAttacking = data.isAttacking;
                opponent.attackAnimation = data.attackAnimation;
                opponent.weaponRecoil = data.weaponRecoil || 0;
                opponent.flip = data.flip;
                opponent.isDashing = data.isDashing;
            } else if (data.type === 'bullet') {
                bullets.push({...data, owner: 'opponent', damage: WEAPONS.PISTOL.damage});
            } else if (data.type === 'slash') {
                createSlashEffect(opponent.x, opponent.y, opponent.aimAngle, 'opponent');
                checkSlashDamage();
            } else if (data.type === 'dash') {
                opponent.isDashing = true;
                setTimeout(() => opponent.isDashing = false, WEAPONS.SWORD.dashDuration);
            } else if (data.type === 'respawn') {
                opponent.isDead = false; opponent.health = 100;
                opponent.x = data.x; opponent.y = data.y;
            } else if (data.type === 'weaponChange') {
                opponent.currentWeapon = data.weapon;
            }
        }
        
        function sendGameData() {
            if (conn && conn.open) {
                conn.send({
                    type: 'player',
                    x: player.x, y: player.y,
                    bodyAngle: player.bodyAngle,
                    aimAngle: player.aimAngle,
                    health: player.health,
                    isDead: player.isDead,
                    score: player.score,
                    weapon: player.currentWeapon,
                    isAttacking: player.isAttacking,
                    attackAnimation: player.attackAnimation,
                    weaponRecoil: player.weaponRecoil,
                    flip: player.flip,
                    isDashing: player.isDashing
                });
            }
        }
        
        function switchWeapon(w) {
            if (player.currentWeapon === w || player.isDead) return;
            player.currentWeapon = w;
            player.weaponRecoil = 0;
            updateWeaponUI();
            if (isMobile) {
                document.getElementById('btnSword').classList.toggle('active', w === 'SWORD');
                document.getElementById('btnPistol').classList.toggle('active', w === 'PISTOL');
                document.getElementById('btnDash').style.display = WEAPONS[w].canDash ? 'flex' : 'none';
                document.getElementById('btnAttack').textContent = w === 'SWORD' ? '⚔️' : '🔫';
            }
            if (conn) conn.send({type: 'weaponChange', weapon: w});
        }
        
        function updateWeaponUI() {
            const weapon = WEAPONS[player.currentWeapon];
            document.getElementById('currentWeaponImg').src = weapon.image.src;
            document.getElementById('weaponName').textContent = `${weapon.name} [${weapon.damage}]`;
        }
        
        // DASH ACELERADO - No teleport
        function performDash() {
            if (player.isDead || player.isDashing) return;
            const weapon = WEAPONS[player.currentWeapon];
            const now = Date.now();
            if (!weapon.canDash || now - player.lastDashTime < weapon.dashCooldown) return;
            
            player.lastDashTime = now;
            player.isDashing = true;
            player.dashEndTime = now + weapon.dashDuration;
            
            // Dirección del dash: hacia donde apunta o hacia donde te mueves
            player.dashDirection = {
                x: Math.cos(player.aimAngle),
                y: Math.sin(player.aimAngle)
            };
            
            // Efecto visual de dash
            createDashEffect(player.x, player.y);
            
            if (conn) conn.send({type: 'dash'});
            
            if (isMobile) updateDashCooldownUI();
        }
        
        function createDashEffect(x, y) {
            const el = document.createElement('div');
            el.className = 'dash-indicator';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }
        
        function updateDashCooldownUI() {
            const btn = document.getElementById('btnDash');
            const overlay = document.getElementById('cooldownOverlay');
            btn.classList.add('cooldown');
            let remaining = WEAPONS.SWORD.dashCooldown;
            const interval = setInterval(() => {
                remaining -= 50;
                overlay.style.height = (100 - (remaining / WEAPONS.SWORD.dashCooldown * 100)) + '%';
                if (remaining <= 0) {
                    clearInterval(interval);
                    btn.classList.remove('cooldown');
                    overlay.style.height = '0%';
                }
            }, 50);
        }
        
        function attack() {
            if (player.isDead || player.isAttacking) return;
            const weapon = WEAPONS[player.currentWeapon];
            if (Date.now() - player.lastAttack < weapon.cooldown) return;
            
            player.lastAttack = Date.now();
            player.isAttacking = true;
            player.attackAnimation = 0;
            
            if (weapon.type === 'melee') {
                setTimeout(() => {
                    createSlashEffect(player.x, player.y, player.aimAngle, 'player');
                    const dist = Math.hypot(opponent.x - player.x, opponent.y - player.y);
                    if (dist < weapon.range && !opponent.isDead) {
                        const angleToOpp = Math.atan2(opponent.y - player.y, opponent.x - player.x);
                        const diff = Math.abs(angleToOpp - player.aimAngle);
                        if (Math.min(diff, 2*Math.PI - diff) < Math.PI/3) {
                            opponent.health -= weapon.damage;
                            createParticles(opponent.x, opponent.y, 5, '#8b0000');
                            if (opponent.health <= 0) {
                                opponent.isDead = true; opponent.health = 0;
                                player.score++;
                            }
                        }
                    }
                    if (conn) conn.send({type: 'slash'});
                }, 80);
                setTimeout(() => player.isAttacking = false, 250);
            } else {
                player.weaponRecoil = weapon.recoil;
                const b = {
                    x: player.x + Math.cos(player.aimAngle) * 25,
                    y: player.y + Math.sin(player.aimAngle) * 25,
                    vx: Math.cos(player.aimAngle) * weapon.speed,
                    vy: Math.sin(player.aimAngle) * weapon.speed,
                    owner: 'player', damage: weapon.damage
                };
                bullets.push(b);
                if (conn) conn.send({type: 'bullet', x: b.x, y: b.y, vx: b.vx, vy: b.vy});
                setTimeout(() => player.isAttacking = false, 80);
            }
        }
        
        function createSlashEffect(x, y, angle, owner) {
            slashEffects.push({x, y, angle, life: 6, owner, distance: 0});
        }
        
        function checkSlashDamage() {
            const weapon = WEAPONS.SWORD;
            const dist = Math.hypot(player.x - opponent.x, player.y - opponent.y);
            if (dist < weapon.range && !player.isDead) {
                const angleToP = Math.atan2(player.y - opponent.y, player.x - opponent.x);
                const diff = Math.abs(angleToP - opponent.aimAngle);
                if (Math.min(diff, 2*Math.PI - diff) < Math.PI/3) {
                    player.health -= weapon.damage;
                    createParticles(player.x, player.y, 5, '#8b0000');
                    if (player.health <= 0) {
                        player.isDead = true; player.health = 0;
                        opponent.score++;
                    }
                }
            }
        }
        
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 0.6,
                    color, size: Math.random() * 2 + 1
                });
            }
        }
        
        function checkWallCollision(x, y, radius) {
            for (let w of walls) {
                if (x + radius > w.x && x - radius < w.x + w.width &&
                    y + radius > w.y && y - radius < w.y + w.height) return true;
            }
            return false;
        }
        
        function respawn() {
            if (isHost) { player.x = 150; player.y = 240; }
            else { player.x = 650; player.y = 240; }
            player.health = 100;
            player.isDead = false;
            player.isDashing = false;
            if (conn) conn.send({type: 'respawn', x: isHost ? 650 : 150, y: 240});
        }
        
        // Controles Móviles pequeños
        function initMobileControls() {
            const zone = document.getElementById('joystickZone');
            const knob = document.getElementById('joystickKnob');
            let center = {x: 0, y: 0};
            
            zone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const t = e.changedTouches[0];
                const r = zone.getBoundingClientRect();
                center = {x: r.left + r.width/2, y: r.top + r.height/2};
                updateJoy(t);
            }, {passive: false});
            
            zone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.changedTouches[0]) updateJoy(e.changedTouches[0]);
            }, {passive: false});
            
            zone.addEventListener('touchend', (e) => {
                e.preventDefault();
                knob.style.transform = `translate(-50%, -50%)`;
                keys['w'] = keys['a'] = keys['s'] = keys['d'] = false;
            });
            
            function updateJoy(t) {
                const max = 25;
                let dx = t.clientX - center.x;
                let dy = t.clientY - center.y;
                const dist = Math.hypot(dx, dy);
                if (dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                keys['w'] = dy < -8; keys['s'] = dy > 8;
                keys['a'] = dx < -8; keys['d'] = dx > 8;
            }
            
            // Mira táctil derecha
            document.addEventListener('touchmove', (e) => {
                for (let t of e.changedTouches) {
                    if (t.clientX > window.innerWidth/2 && 
                        !e.target.closest('#actionButtons') && 
                        !e.target.closest('#weaponSelect')) {
                        const rect = canvas.getBoundingClientRect();
                        const scaleX = canvas.width / rect.width;
                        const scaleY = canvas.height / rect.height;
                        mouse.x = (t.clientX - rect.left) * scaleX;
                        mouse.y = (t.clientY - rect.top) * scaleY;
                    }
                }
            }, {passive: false});
        }
        
        function startGame() {
            document.getElementById('lobbyMenu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('ui').style.display = 'block';
            
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'block';
                document.getElementById('btnSword').classList.add('active');
                initMobileControls();
            } else {
                document.getElementById('crosshair').style.display = 'block';
                window.addEventListener('keydown', (e) => {
                    keys[e.key.toLowerCase()] = true;
                    if (e.key === '1') switchWeapon('SWORD');
                    if (e.key === '2') switchWeapon('PISTOL');
                    if (e.key.toLowerCase() === 'q') performDash();
                });
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    mouse.x = (e.clientX - rect.left) * scaleX;
                    mouse.y = (e.clientY - rect.top) * scaleY;
                    
                    const ch = document.getElementById('crosshair');
                    ch.style.left = e.clientX + 'px';
                    ch.style.top = e.clientY + 'px';
                });
                window.addEventListener('mousedown', attack);
            }
            
            if (!isHost) { player.x = 650; opponent.x = 150; }
            updateWeaponUI();
            requestAnimationFrame(update);
            setInterval(sendGameData, 1000/60);
        }
        
        function update() {
            // Fondo arena
            ctx.fillStyle = '#3d3429';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Lógica jugador
            if (!player.isDead) {
                // Calcular mira siempre
                player.aimAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                player.flip = player.aimAngle > Math.PI/2 || player.aimAngle < -Math.PI/2;
                
                // Movimiento
                let moveX = 0, moveY = 0;
                if (keys['w']) moveY = -1;
                if (keys['s']) moveY = 1;
                if (keys['a']) moveX = -1;
                if (keys['d']) moveX = 1;
                
                // Normalizar y aplicar velocidad
                if (moveX !== 0 || moveY !== 0) {
                    const len = Math.hypot(moveX, moveY);
                    moveX /= len; moveY /= len;
                    
                    // Ángulo del cuerpo = dirección de movimiento (no de la mira)
                    player.bodyAngle = Math.atan2(moveY, moveX);
                    
                    // Velocidad: normal o dash
                    let currentSpeed = player.baseSpeed;
                    if (player.isDashing) {
                        if (Date.now() > player.dashEndTime) {
                            player.isDashing = false;
                        } else {
                            currentSpeed = WEAPONS.SWORD.dashSpeed;
                            // En dash, mover en la dirección del dash, no de las teclas
                            moveX = player.dashDirection.x;
                            moveY = player.dashDirection.y;
                        }
                    }
                    
                    const newX = player.x + moveX * currentSpeed;
                    const newY = player.y + moveY * currentSpeed;
                    
                    if (!checkWallCollision(newX, player.y, player.width/2)) player.x = newX;
                    if (!checkWallCollision(player.x, newY, player.height/2)) player.y = newY;
                } else {
                    // Si no te mueves, el cuerpo mantiene su última rotación
                    // o mira hacia donde apuntas (opcional)
                    // player.bodyAngle = player.aimAngle; // Descomenta si quieres que gire cuando está quieto
                }
                
                if (player.isAttacking) {
                    player.attackAnimation += 0.2;
                    if (player.attackAnimation >= 1) player.isAttacking = false;
                }
                if (player.weaponRecoil > 0) {
                    player.weaponRecoil -= WEAPONS.PISTOL.recoilRecovery;
                    if (player.weaponRecoil < 0) player.weaponRecoil = 0;
                }
            } else {
                if (!player.respawnTimer) player.respawnTimer = Date.now();
                else if (Date.now() - player.respawnTimer > 3000) {
                    player.respawnTimer = null;
                    respawn();
                }
            }
            
            // Paredes pequeñas
            ctx.fillStyle = '#b8b8b8';
            ctx.strokeStyle = '#909090';
            walls.forEach(w => {
                ctx.fillRect(w.x, w.y, w.width, w.height);
                ctx.strokeRect(w.x, w.y, w.width, w.height);
            });
            
            // Balas pequeñas
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy;
                if (checkWallCollision(b.x, b.y, 2)) {
                    bullets.splice(i, 1);
                    continue;
                }
                const target = b.owner === 'player' ? opponent : player;
                const dist = Math.hypot(b.x - target.x, b.y - target.y);
                if (dist < target.width/2 + 3 && !target.isDead) {
                    target.health -= b.damage;
                    createParticles(target.x, target.y, 4, '#8b0000');
                    if (target.health <= 0) {
                        target.isDead = true; target.health = 0;
                        if (b.owner === 'player') player.score++;
                        else opponent.score++;
                    }
                    bullets.splice(i, 1);
                    continue;
                }
                if (b.x < 0 || b.x > 800 || b.y < 0 || b.y > 480) {
                    bullets.splice(i, 1);
                    continue;
                }
                ctx.fillStyle = '#d4af37';
                ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
            }
            
            // Efectos slash
            slashEffects.forEach((s, i) => {
                s.life--; s.distance += 2;
                if (s.life <= 0) slashEffects.splice(i, 1);
                else {
                    ctx.save();
                    ctx.translate(s.x, s.y);
                    ctx.rotate(s.angle);
                    ctx.strokeStyle = `rgba(200,200,200,${s.life/6*0.3})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(0, 0, 25 + s.distance, -Math.PI/4, Math.PI/4);
                    ctx.stroke();
                    ctx.restore();
                }
            });
            
            // Partículas
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });
            ctx.globalAlpha = 1;
            
            // Dibujar oponente
            if (!opponent.isDead) {
                // Sombra
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(opponent.x, opponent.y + 12, 12, 4, 0, 0, Math.PI*2);
                ctx.fill();
                
                // Cuerpo con su propio ángulo (movimiento)
                drawSprite(assets.player, opponent.x, opponent.y, opponent.width, opponent.height, 
                          opponent.bodyAngle || 0, opponent.flip);
                
                // Arma con ángulo de mira
                const oppW = WEAPONS[opponent.currentWeapon];
                drawWeapon(oppW, opponent.x, opponent.y, opponent.aimAngle || 0,
                    opponent.isAttacking, opponent.attackAnimation, opponent.weaponRecoil || 0, opponent.flip);
                
                // HP bar pequeña
                ctx.fillStyle = '#333';
                ctx.fillRect(opponent.x - 15, opponent.y - 20, 30, 3);
                ctx.fillStyle = opponent.health > 50 ? '#d4af37' : '#8b0000';
                ctx.fillRect(opponent.x - 15, opponent.y - 20, 30 * (opponent.health/100), 3);
            }
            
            // Dibujar jugador
            if (!player.isDead) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(player.x, player.y + 12, 12, 4, 0, 0, Math.PI*2);
                ctx.fill();
                
                // Indicador dash listo
                if (WEAPONS[player.currentWeapon].canDash && !player.isDashing && 
                    Date.now() - player.lastDashTime > WEAPONS.SWORD.dashCooldown) {
                    ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, 18, 0, Math.PI*2);
                    ctx.stroke();
                }
                
                // Cuerpo (rotación independiente)
                drawSprite(assets.player, player.x, player.y, player.width, player.height, 
                          player.bodyAngle, player.flip, playerColor);
                
                // Arma (sigue la mira)
                const curW = WEAPONS[player.currentWeapon];
                drawWeapon(curW, player.x, player.y, player.aimAngle,
                    player.isAttacking, player.attackAnimation, player.weaponRecoil, player.flip);
            } else {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#666';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('CAÍDO', canvas.width/2, canvas.height/2 - 20);
                const tl = Math.max(0, Math.ceil((3000 - (Date.now() - player.respawnTimer))/1000));
                ctx.font = '12px Arial';
                ctx.fillText(`Respawn ${tl}s`, canvas.width/2, canvas.height/2 + 10);
            }
            
            // UI pequeña
            document.getElementById('health').style.width = player.health + '%';
            ctx.fillStyle = '#d0d0d0';
            ctx.font = 'bold 16px Orbitron';
            ctx.textAlign = 'center';
            ctx.fillText(`${player.score} : ${opponent.score}`, canvas.width/2, 25);
            
            requestAnimationFrame(update);
        }
        
        // Dibujar sprite con rotación y color opcional
        function drawSprite(img, x, y, w, h, angle, flip, tint) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            if (flip) ctx.scale(1, -1);
            
            if (tint) {
                ctx.drawImage(img, -w/2, -h/2, w, h);
                ctx.globalCompositeOperation = 'source-atop';
                ctx.fillStyle = tint;
                ctx.globalAlpha = 0.4;
                ctx.fillRect(-w/2, -h/2, w, h);
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.drawImage(img, -w/2, -h/2, w, h);
            }
            ctx.restore();
        }
        
        // Dibujar arma rotada independientemente
        function drawWeapon(weapon, x, y, angle, isAttacking, attackProgress, recoil, flip) {
            ctx.save();
            ctx.translate(x, y);
            
            let drawAngle = angle;
            if (weapon.type === 'ranged' && recoil > 0) drawAngle -= recoil;
            if (weapon.type === 'melee' && isAttacking) {
                drawAngle += Math.sin(attackProgress * Math.PI) * Math.PI/4;
            }
            
            ctx.rotate(drawAngle);
            if (flip) ctx.scale(1, -1);
            
            let offX = weapon.offsetX;
            if (weapon.type === 'ranged' && recoil > 0) offX -= recoil * 8;
            
            ctx.drawImage(weapon.image, offX - 15, weapon.offsetY - 15, 30, 30);
            ctx.restore();
        }
    </script>
